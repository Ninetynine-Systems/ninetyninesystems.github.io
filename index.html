<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ninetynine Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --ink:       #0f0f0e;
      --ink-mid:   #3a3a36;
      --ink-faint: #a8a89e;
      --paper:     #f5f4f0;
      --rule:      #d6d4cc;
      --accent:    #c0392b;
      --accent2:   #1a3a5c;
    }

    html, body {
      height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* Subtle grid texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--rule) 1px, transparent 1px),
        linear-gradient(90deg, var(--rule) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    /* Corner rule marks — blueprint feel */
    .corner {
      position: fixed;
      width: 24px;
      height: 24px;
      z-index: 10;
    }
    .corner--tl { top: 32px; left: 32px; border-top: 1.5px solid var(--ink-mid); border-left: 1.5px solid var(--ink-mid); }
    .corner--tr { top: 32px; right: 32px; border-top: 1.5px solid var(--ink-mid); border-right: 1.5px solid var(--ink-mid); }
    .corner--bl { bottom: 32px; left: 32px; border-bottom: 1.5px solid var(--ink-mid); border-left: 1.5px solid var(--ink-mid); }
    .corner--br { bottom: 32px; right: 32px; border-bottom: 1.5px solid var(--ink-mid); border-right: 1.5px solid var(--ink-mid); }

    /* Thin horizontal rule across full width */
    .h-rule {
      position: fixed;
      left: 0; right: 0;
      height: 1px;
      background: var(--rule);
      z-index: 5;
    }
    .h-rule--top    { top: 80px; }
    .h-rule--bottom { bottom: 80px; }

    /* Main layout */
    main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Logo block */
    .logo {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-end;
      opacity: 0;
      transform: translateY(16px);
      animation: reveal 1.1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s forwards;
    }

    .logo__primary {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(3.2rem, 8vw, 7rem);
      letter-spacing: -0.01em;
      line-height: 1;
      color: var(--ink);
      white-space: nowrap;
    }

    /* The constraint: .Systems right-aligns with Ninetynine */
    .logo__secondary {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: clamp(1rem, 2.2vw, 1.85rem);
      letter-spacing: 0.08em;
      line-height: 1;
      color: var(--ink-mid);
      margin-top: 0.18em;
      white-space: nowrap;
    }

    /* Accent dot on .Systems */
    .logo__secondary .dot {
      color: var(--accent);
      font-weight: 400;
    }

    /* Thin decorative separator between the two lines */
    .logo__rule {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--ink-mid) 60%, var(--ink-mid));
      margin: 0.28em 0;
      opacity: 0.4;
    }

    /* Tagline */
    .tagline {
      position: fixed;
      bottom: 96px;
      right: 64px;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      text-align: right;
      line-height: 1.9;
      opacity: 0;
      animation: reveal 1s ease 0.9s forwards;
    }

    /* Small identifier top-left */
    .ident {
      position: fixed;
      top: 96px;
      left: 64px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      line-height: 2;
      opacity: 0;
      animation: reveal 1s ease 0.7s forwards;
    }

    /* Coordinate-style label, top right */
    .coord {
      position: fixed;
      top: 96px;
      right: 64px;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--ink-faint);
      text-align: right;
      opacity: 0;
      animation: reveal 1s ease 0.7s forwards;
    }

    .logo-wrap {
      position: relative;
    }

    @keyframes reveal {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Subtle noise grain overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.025;
      pointer-events: none;
      z-index: 20;
    }
  </style>
</head>
<body>

  <!-- Blueprint corners -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>

  <!-- Horizontal rules -->
  <div class="h-rule h-rule--top"></div>
  <div class="h-rule h-rule--bottom"></div>

  <!-- Top-left identifier -->
  <div class="ident">
    Ninetynine Systems<br />
    Est. 2026 — Dhaka, BD<br />
  </div>

  <!-- Top-right coordinate -->
  <div class="coord">23°46'50.9"N<br />90°24'14.0"E</div>

  <!-- Bottom-right tagline -->
  <div class="tagline">
    Frontier AI · Software · Defense · Civilian<br />
    Building what comes next.
  </div>

  <main>
    <div class="logo-wrap">
      <div class="logo">
        <span class="logo__primary">Ninetynine</span>
        <div class="logo__rule"></div>
        <span class="logo__secondary"><span class="dot">.</span>Systems</span>
      </div>
    </div>
  </main>

</body>
</html>
